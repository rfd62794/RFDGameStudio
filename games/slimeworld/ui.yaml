game: slimeworld

layout_tree:
  direction: column
  children:
    - id: header
      height: 0.10
    - id: tab_nav
      height: 0.06
    - id: content
      flex: 1
    - id: footer
      height: 0.05

regions:
  header:
    component: app_header
    bindings:
      title: "SLIMEWORLD"
      bank: game_state.credits
  tab_nav:
    component: tab_bar
    tabs_from: layout.tabs
  content:
    component: tab_content
  footer:
    component: app_footer
    text: "RFDGAMESTUDIO • SLIMEWORLD"

layout:
  type: tabbed
  tabs:
    - id: lab
      label: Lab
      icon: home
      default: true
    - id: planet
      label: Planet
      icon: globe
    - id: economy
      label: Economy
      icon: currency
    - id: codex
      label: Codex
      icon: book

header:
  components:
    - type: label
      text: "SLIMEWORLD"
      style: title
    - type: label
      text: "CONTINUOUS COLOR, SHAPE, AND ACCENT GENETICS"
      style: subtitle
    - type: stat_display
      label: "TREASURY"
      field: game_state.credits
      format: currency

# --- LAB TAB ---
tabs:
  lab:
    content:
      - type: stat_display
        label: "TREASURY"
        field: game_state.credits
        format: currency
      - type: stat_display
        label: "ROSTER"
        field: game_state.slimes
        format: "{value.length} / {game_state.roster_cap}"
      - type: card_grid
        data_source: game_state.slimes
        card_template: slime_card
        empty_state: "No slimes in roster."
    slime_card:
      components:
        - type: label
          field: slime.name
          style: card_title
        - type: badge
          field: slime.color
        - type: badge
          field: slime.generation
          format: "GEN {value}"
        - type: stat_bar
          label: "Hue"
          field: slime.hue
          max: 360
        - type: stat_bar
          label: "Saturation"
          field: slime.saturation
          max: 100
        - type: stat_bar
          label: "Vertex Count"
          field: slime.vertex_count
          max: 22
        - type: stat_bar
          label: "Irregularity"
          field: slime.irregularity
          max: 100
        - type: stat_bar
          label: "Diffusion Ratio"
          field: slime.diffusion_ratio
          max: 100
        - type: stat_bar
          label: "Amplitude"
          field: slime.amplitude
          max: 100
        - type: action_button
          label: "Sell"
          event: sell_on_market
          data: slime.id
          style: danger
    breeding:
      - type: breed_selector
        label: "Select Parent A"
        data_source: game_state.slimes
        selection_event: select_parent_a
      - type: breed_selector
        label: "Select Parent B"
        data_source: game_state.slimes
        selection_event: select_parent_b
      - type: action_button
        label: "Breed"
        event: initiate_breeding
        requires: [parent_a_selected, parent_b_selected, roster_not_full]

  # --- PLANET TAB ---
  planet:
    content:
      - type: card_grid
        data_source: game_state.planet_region.nodes
        card_template: node_card
        empty_state: "No planetary sectors discovered."
    node_card:
      components:
        - type: label
          field: node.name
          style: card_title
        - type: badge
          field: node.owner_color
          values: {null: "Unclaimed"}
        - type: stat_bar
          label: "Strength"
          field: node.strength
          max: 1
        - type: action_button
          label: "Force Claim"
          event: force_claim_action
          data: node.id
        - type: action_button
          label: "Bribe"
          event: bribe_claim_action
          data: node.id
        - type: action_button
          label: "Convert"
          event: convert_claim_action
          data: node.id
        - type: action_button
          label: "Assign Garrison"
          event: assign_garrison
          data: node.id
          requires: [node_owned]

  # --- ECONOMY TAB ---
  economy:
    content:
      - type: list
        label: "Active Contracts"
        data_source: game_state.contracts
        item_template: contract_item
        empty_state: "No active contracts."
      - type: action_button
        label: "Upgrade Capacity (150g)"
        event: buy_upgrade
        data: "capacity"
      - type: action_button
        label: "Upgrade Stabilizer (200g)"
        event: buy_upgrade
        data: "stabilizer"
      - type: action_button
        label: "Install Autofeeder (250g)"
        event: buy_upgrade
        data: "autofeeder"
        requires: [not_already_owned]
    contract_item:
      components:
        - type: label
          field: contract.name
        - type: label
          format: "Reward: {contract.credits_reward}g"
        - type: label
          format: "Expires in {contract.cycles_remaining} cycles"
        - type: action_button
          label: "Deliver"
          event: deliver_contract
          data: contract.id

  # --- CODEX TAB ---
  codex:
    content:
      - type: label
        text: "Discovered Color Targets"
        style: section_title
      - type: list
        data_source: game_state.discovered_color_targets
        item_template: codex_entry
      - type: label
        text: "Discovered Shape Targets"
        style: section_title
      - type: list
        data_source: game_state.discovered_shape_targets
        item_template: codex_entry
      - type: label
        text: "Discovered Accent Targets"
        style: section_title
      - type: list
        data_source: game_state.discovered_accent_targets
        item_template: codex_entry
    codex_entry:
      components:
        - type: label
          field: target.name
        - type: label
          field: target.tier

footer:
  - type: label
    text: "RFDGAMESTUDIO • SLIMEWORLD"
    style: footer
