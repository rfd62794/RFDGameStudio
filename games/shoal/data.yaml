game:
  id: shoal
  name: Shoal
  version: "2.0"
  studio: RFDGameStudio

world:
  width: 1200
  height: 800
  surface_depth: 0
  floor_depth: 800
  discrete_tick: 0.25

spawn:
  initial_fish: 60
  initial_sharks: 8
  initial_algae_hubs: 6
  algae_spawn_depth: 180

creatures:
  fish:
    max_speed: 120
    max_force: 80
    radius: 5
    perception:
      algae: 250
      shark: 190
      separate: 24
      school: 70
    escape_chance: 0.28
    escape_speed_bonus: 0.15
    escape_knockback: 20
    breed_age: 4
    breed_fed_threshold: 2
    carrying_capacity: 100
    hunger_rate: 0.05
    graze_radius: 8
    max_safe_cold_rate: 8
    max_turn_rate: 4.0
    home_depth: 180
    cold:
      threshold: 100
      damage_rate: 15
      damage_limit: 30
      decay_rate: 10
  shark:
    max_speed: 150
    max_force: 90
    radius: 7
    perception:
      fish: 220
      flesh: 220
    breed_age: 18
    breed_fed_threshold: 3
    starve_limit: 20
    max_turn_rate: 6.0
    home_depth: 300
    home_bias_weight: 1.0
    fish_hunger_refund: 4
    exposure:
      threshold: 100
      damage_rate: 20
      decay_rate: 10
    exposure_retreat_threshold: 70
    exposure_retreat_resume_threshold: 40
    exposure_retreat_weight: 3.0

steering_weights:
  fish:
    seek_algae: 1.0
    flee_shark: 2.5
    separate: 1.0
    align: 0.6
    cohere: 0.35
    wander: 0.4
    depth_bias: 0.8
  shark:
    seek_fish: 1.5
    seek_flesh: 1.5
    wander: 0.3

wander:
  circle_distance: 40
  circle_radius: 15
  change_interval: 0.4

algae:
  nodule_radius: 6
  spoke_distances: [24, 48]
  regrow_cooldown: 3.0
  max_sunk_depth: 600
  min_surface_depth: 80
  depth_lerp_speed: 20

flesh_chunk:
  radius: 5
  min_spawn: 1
  max_spawn: 3
  sink_rate: 10
  shark_eat_range: 20
  hunger_refund: 3
  floor_grace_time: 2.5

