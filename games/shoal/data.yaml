    top: 0
    bottom: 40
    exposure_rate: 40
    fish_cold_rate: 0
    color: "#e0f7ff"
  - id: epipelagic
    top: 40
    bottom: 120
    exposure_rate: 8
    fish_cold_rate: 0
    color: "#7dd3fc"
  - id: mesopelagic
    top: 120
    bottom: 280
    exposure_rate: 2
    fish_cold_rate: 3
    color: "#38bdf8"
  - id: bathypelagic
    top: 280
    bottom: 480
    exposure_rate: 1
    fish_cold_rate: 8
    color: "#0ea5e9"
  - id: abyssopelagic
    top: 480
    bottom: 680
    exposure_rate: 0
    fish_cold_rate: 18
    color: "#0369a1"
  - id: hadopelagic
    top: 680
    bottom: 800
    exposure_rate: 0
    fish_cold_rate: 35
    color: "#0c4a6e"

spatial_hash:
  bucket_width: 120
  bucket_depth: 80

render:
  fish_radius: 4
  shark_radius: 7
  nodule_radius: 6
  chunk_radius: 5
