# RFDGameStudio — Horse Racing & Breeding
# Data Layer — extracted from types.ts
# Renderer-agnostic. TypeScript, Python, Rust all read this.

game:
  id: horse_racing
  name: Derby Sim
  version: "1.2"
  studio: RFDGameStudio

# --- STABLE ---
stable:
  starting_funds: 1000
  starting_slots: 3
  max_slots: 12
  unlock_cost_per_slot: 500
  starter_horse_cost: 400
  starter_min_stat: 35
  starter_max_stat: 55
  race_cooldown_ms: 90000
  breed_cooldown_ms: 180000

betting:
  place_odds_multiplier: 0.38
  place_odds_min: 1.15
  show_odds_multiplier: 0.20
  show_odds_min: 1.05

race:
  overround: 1.12
  field_size: 6
  npc_pool_size: 20
  prize_splits:
    first: 0.60
    second: 0.25
    third: 0.15

# --- HORSE SCHEMA ---
horse:
  fields:
    id: string
    name: string
    gender: [Stallion, Mare]
    generation: integer
    stats:
      speed: {min: 0, max: 100, description: Maximum speed}
      stamina: {min: 0, max: 100, description: Slower fatigue rate}
      acceleration: {min: 0, max: 100, description: Time to reach top speed}
      temperament: {min: 0, max: 100, description: Higher = more consistent, lower = volatile}
    colors:
      body: hex
      mane: hex
      socks: hex
      jockey_silk: hex
    career:
      runs: integer
      wins: integer
      places: integer
      thirds: integer
      earnings: integer
    cooldown_until: timestamp
    player_owned: boolean
    parents:
      sire_id: string
      sire_name: string
      dam_id: string
      dam_name: string
    price: integer

