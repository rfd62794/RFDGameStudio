# RFDGameStudio — Horse Racing & Breeding
# Data Layer — extracted from types.ts
# Renderer-agnostic. TypeScript, Python, Rust all read this.

game:
  id: horse_racing
  name: Derby Sim
  version: "1.2"
  studio: RFDGameStudio

# --- STABLE ---
stable:
  starting_funds: 3000
  starting_slots: 3
  max_slots: 12
  unlock_cost_per_slot: 500

# --- HORSE SCHEMA ---
horse:
  fields:
    id: string
    name: string
    gender: [Stallion, Mare]
    generation: integer
    stats:
      speed: {min: 0, max: 100, description: Maximum speed}
      stamina: {min: 0, max: 100, description: Slower fatigue rate}
      acceleration: {min: 0, max: 100, description: Time to reach top speed}
      temperament: {min: 0, max: 100, description: Higher = more consistent, lower = volatile}
    colors:
      body: hex
      mane: hex
      socks: hex
      jockey_silk: hex
    career:
      runs: integer
      wins: integer
      places: integer
      thirds: integer
      earnings: integer
    cooldown_until: timestamp
    player_owned: boolean
    parents:
      sire_id: string
      sire_name: string
      dam_id: string
      dam_name: string
    price: integer

# --- COAT COLOR PROFILES ---
coat_colors:
  - name: Bay
    body: "#91532B"
    mane: "#1C1917"
    socks: "#1C1917"
    weight: 30
  - name: Chestnut
    body: "#A15C21"
    mane: "#B46E2A"
    socks: "#A15C21"
    weight: 25
  - name: Black
    body: "#292524"
    mane: "#1C1917"
    socks: "#1C1917"
    weight: 15
  - name: Gray
    body: "#D6D3D1"
    mane: "#F5F5F4"
    socks: "#A8A29E"
    weight: 15
  - name: Palomino
    body: "#EAB308"
    mane: "#FEF08A"
    socks: "#FEF08A"
    weight: 8
  - name: Buckskin
    body: "#EAB308"
    mane: "#1C1917"
    socks: "#1C1917"
    weight: 5
  - name: Albino
    body: "#FAFAF9"
    mane: "#FAFAF9"
    socks: "#E7E5E4"
    weight: 1
  - name: Emerald (Rare Mutation)
    body: "#059669"
    mane: "#34D399"
    socks: "#059669"
